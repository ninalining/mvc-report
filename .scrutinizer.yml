checks:
    php: true

build:
    image: default-bionic
    nodes:
        analysis:
            tests:
                override:
                    - php-scrutinizer-run
        coverage:
            environment:
                php:
                    version: 8.3.3
            tests:
                override:
                    -
                        command: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-clover=docs/coverage.clover
                        coverage:
                            file: docs/coverage.clover
                            format: php-clover

filter:
    excluded_paths:
        - tests/
        - var/
        - vendor/
        - tools/
        - migrations/
        - config/
